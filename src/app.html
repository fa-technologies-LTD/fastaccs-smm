		<script>
			// Snap Pixel: fires synchronously on first paint, before the SvelteKit
			// bundle hydrates, so fast bounces from ad clicks are still counted.
			// Pixel ID must stay in sync with SNAP_PIXEL_ID in
			// src/lib/services/snap-pixel.ts.
			(function (e, t, n) {
				var hostname = e.location.hostname.toLowerCase();
				if (['localhost', '127.0.0.1', '0.0.0.0'].indexOf(hostname) !== -1) return;
				if (e.snaptr) return;
				var a = (e.snaptr = function () {
					a.handleRequest ? a.handleRequest.apply(a, arguments) : a.queue.push(arguments);
				});
				a.queue = [];
				var s = 'script';
				var r = t.createElement(s);
				r.async = true;
				r.src = n;
				r.setAttribute('data-snap-pixel-loader', 'true');
				var u = t.getElementsByTagName(s)[0];
				u.parentNode.insertBefore(r, u);
				a('init', 'c375a46a-6194-4916-ae1c-7660f6d5847f', {});
				a('track', 'PAGE_VIEW');
				e.__snapPixelBootstrapped = true;
				e.__snapPixelInitialPageKey = e.location.pathname + e.location.search;
			})(window, document, 'https://sc-static.net/scevent.min.js');
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="off">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
